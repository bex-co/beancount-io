type Mutation {
  addEntries(entriesInput: [EntryInput!]!, ledgerId: String): AddEntryResponse!
  addOrUpdateLedgerCollaborator(collaborator: String!, ledgerId: String!, permission: String): AddCollaboratorResponse!
  approvePullRequest(ledgerName: String!, ledgerOwner: String!, prNumber: Int!): PullRequestResult!
  """Add one or more entries to a specific ledger (atomic)"""
  bulkEntries(entries: [AddEntryInput!]!, ledgerId: String!): AddLedgerEntryResponse!
  cancelSubscription(clientId: String!, subscriptionId: String!): SubscriptionActionResult!
  """
  Authorize a pending CLI session. Issues a JWT token for the CLI and stores it in the session.
  """
  confirmCliAuthSession(sessionId: String!): ConfirmCliAuthSessionResponse!
  """
  Retrieve and consume the token from an authorized CLI auth session. Single-use: clears the token from the session after returning it. Only the CLI should call this.
  """
  consumeCliAuthSession(sessionId: String!): ConsumeCliAuthSessionResponse!
  """
  Initiate a CLI authentication session. Returns a sessionId the CLI uses to poll for completion.
  """
  createCliAuthSession: CreateCliAuthSessionResponse!
  """Create a new ledger for the current user"""
  createLedger(description: String, name: String!, private: Boolean, template: LedgerTemplate): Ledger!
  """Create a new file in a specific ledger"""
  createLedgerFile(content: String!, ledgerId: String!, message: String, path: String!): LedgerFileContent!
  createOneTimeToken: CreateOneTimeTokenResponse!
  """Create a Plaid Link token for connecting bank accounts"""
  createPlaidLinkToken(ledgerId: String!): PlaidLinkToken!
  """Create a Plaid Link token in update mode for reauthentication"""
  createPlaidUpdateModeLinkToken(itemId: String!, ledgerId: String!): PlaidLinkToken!
  """Create a new public key for the current user"""
  createPublicKey(key: String!, readOnly: Boolean = false, title: String!): PublicKey!
  createPullRequestFromPatch(input: CreatePRFromPatchInput!): PullRequestResult!
  createStripePortalSession(clientId: String!): SubscriptionSessionResult!
  createSubscriptionSession(clientId: String!, priceId: String!): SubscriptionSessionResult!
  """delete user account and its associated data"""
  deleteAccount: Boolean!
  """Delete a specific ledger"""
  deleteLedger(ledgerId: String!): DeleteLedgerResponse!
  deleteLedgerCollaborator(collaborator: String!, ledgerId: String!): DeleteCollaboratorResponse!
  """Delete a source slice for a specific journal entry"""
  deleteLedgerEntrySourceSlice(input: DeleteSourceSliceInput!, ledgerId: String!): DeleteSourceSliceResponse!
  """Delete a file from a specific ledger"""
  deleteLedgerFile(ledgerId: String!, message: String, path: String!, sha: String!): DeleteLedgerFileResponse!
  """
  Delete multiple source slices for journal entries in a single operation
  """
  deleteMultipleLedgerEntrySourceSlices(input: DeleteMultiSourceSlicesInput!, ledgerId: String!): DeleteMultiSourceSlicesResponse!
  """Delete pending (unsynced) Plaid transactions from the review list"""
  deletePlaidTransactions(ledgerId: String!, transactionIds: [String!]!): PlaidDeleteResult!
  """Delete a specific public key by ID"""
  deletePublicKey(keyId: Float!): DeletePublicKeyResponse!
  """Deny a pending CLI authentication session."""
  denyCliAuthSession(sessionId: String!): DenyCliAuthSessionResponse!
  """Exchange Plaid public token for access token and store Item"""
  exchangePlaidPublicToken(ledgerId: String!, publicToken: String!): PlaidItemType!
  """Follow a user"""
  followUser(
    """Username to follow"""
    username: String!
  ): FollowUserResponse!
  generateTempAssetUploadUrl(filename: String, mimeType: String): TempAssetUploadUrl!
  """
  Upload a receipt and insert a transaction entry. Storage strategy (S3 or git) is controlled by the `receipt_storage` beancountio-option.
  """
  insertReceiptTransaction(input: InsertReceiptTransactionInput!, ledgerId: String!, receiptObjectKey: String!): InsertReceiptResult!
  leaveLedger(ledgerId: String!): DeleteCollaboratorResponse!
  """Logout user, revoke JWT token and clear httpOnly cookie"""
  logout: LogoutResponse!
  """
  Parse an uploaded file (multimodal support for PDF/images/any format) into structured transactions. File must be uploaded to S3 first.
  """
  parseFile(
    """File format type (e.g., csv, pdf, xlsx, json, etc.)"""
    fileFormat: String!
    """S3 object key from upload"""
    s3ObjectKey: String!
  ): FileParseResult!
  """
  Parse a receipt image or PDF and return a single summarized transaction with account recommendations. File must be uploaded to S3 first.
  """
  parseReceipt(
    """Ledger ID used to fetch available accounts for recommendation"""
    ledgerId: String!
    """S3 object key of the receipt (image or PDF only)"""
    s3ObjectKey: String!
  ): ReceiptParseResult!
  """
  Refresh Plaid Item status from Plaid API (useful after reauthentication)
  """
  refreshPlaidItemStatus(itemId: String!, ledgerId: String!): PlaidItemType!
  """
  Refresh authentication token - issues a new token and revokes the current one
  """
  refreshToken: TokenAuthResponse!
  rejectPullRequest(ledgerName: String!, ledgerOwner: String!, prNumber: Int!): PullRequestResult!
  """Rename a file in a specific ledger"""
  renameLedgerFile(ledgerId: String!, message: String, newPath: String!, oldPath: String!): RenameLedgerFileResponse!
  """Reset user password using a token from the password reset email"""
  resetPassword(newPassword: String!, token: String!): ResetPasswordResponse!
  resumeSubscription(clientId: String!, subscriptionId: String!): SubscriptionActionResult!
  """Send a password reset link to the user's email"""
  sendForgotPasswordLink(email: String!): SendForgotPasswordLinkResponse!
  signIn(email: String!, password: String!): TokenAuthResponse!
  signInWithOneTimeToken(token: String!): TokenAuthResponse!
  """
  Start signup by creating an OTP session. Sends a verification code to the user's email.
  """
  signUp(email: String!, firstName: String!, inviteBy: String, inviteSrc: String, lastName: String!, password: String!, username: String, withDefaultLedger: Boolean): SignUpResponse!
  """Star a specific ledger"""
  starLedger(ledgerId: String!): StarLedgerResponse!
  """Submit Plaid transactions with user-reviewed target accounts to ledger"""
  submitPlaidTransactionsToLedger(
    """
    Existing ledger file to write the transactions to; defaults to main.bean
    """
    filename: String
    ledgerId: String!
    transactions: [PlaidTransactionSubmitInput!]!
  ): PlaidSubmitResult!
  """Manually sync transactions for a specific Plaid Item"""
  syncPlaidTransactions(itemId: String!, ledgerId: String!): PlaidSyncResult!
  """Unfollow a user"""
  unfollowUser(
    """Username to follow"""
    username: String!
  ): FollowUserResponse!
  """Unlink a Plaid Item (remove from Plaid and delete from database)"""
  unlinkPlaidItem(itemId: String!, ledgerId: String!): Boolean!
  """Unstar a specific ledger"""
  unstarLedger(ledgerId: String!): StarLedgerResponse!
  """Update a specific ledger"""
  updateLedger(description: String, ledgerId: String!, name: String, private: Boolean): Ledger!
  """Update a source slice for a specific journal entry"""
  updateLedgerEntrySourceSlice(input: UpdateSourceSliceInput!, ledgerId: String!): UpdateSourceSliceResponse!
  """Update an existing file in a specific ledger"""
  updateLedgerFile(content: String!, ledgerId: String!, message: String, path: String!, sha: String!): LedgerFileContent!
  """Update the currency used for a Plaid account's transactions"""
  updatePlaidAccountCurrency(accountId: String!, currency: String!, ledgerId: String!): Boolean!
  """Update the ledger account mapping for a Plaid account"""
  updatePlaidAccountMapping(accountId: String!, ledgerAccount: String!, ledgerId: String!): Boolean!
  """Update user profile (firstName and lastName)"""
  updateProfile(firstName: String, lastName: String): UserProfileResponse!
  updateUsername(username: String!): UserProfileResponse!
  upgradeSubscription(clientId: String!, priceId: String!): UpgradeSubscriptionResult!
  """Verify OTP and create user account to complete signup"""
  verifySignUpOtp(otp: String!, sessionId: String!): TokenAuthResponse!
}

