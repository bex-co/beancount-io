query AccountReport(
  $ledgerId: String!
  $accountName: String!
  $interval: String
  $time: String
  $conversion: String!
) {
  getLedgerAccountReport(
    ledgerId: $ledgerId
    accountName: $accountName
    interval: $interval
    time: $time
    conversion: $conversion
  ) {
    linechartData {
      date
      balance
    }
    intervalTotalsData {
      date
      balance
    }
    accountBalanceData {
      date
      balance
    }
  }
}
